<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#080c18"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="EDC 2026"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="assets/webp/icon-512.webp"/>
<title>EDC LV 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Mono:wght@400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c18;--bg2:#0d1224;--bg3:#111829;
  --border:rgba(255,255,255,.08);
  --text:rgba(255,255,255,.92);--text2:rgba(255,255,255,.5);--text3:rgba(255,255,255,.22);
  --accent:#fc3cbf;--accent2:#0bf5f8;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text)}
#root{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none;-ms-overflow-style:none}
input,textarea,button{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}
img{display:block}
.sora{font-family:'Sora',sans-serif}
.mono{font-family:'Space Mono',monospace}
.orb{font-family:'Orbitron',sans-serif}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.anim-up{animation:fadeUp .26s ease both}
.pulse{animation:pulse 2.2s ease-in-out infinite}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="data.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" src="app-part1.js" data-presets="react"></script>
<script type="text/babel" src="app-part2.js" data-presets="react"></script>
</body>
</html>
