<style>
:root{
  --bg:#080c18;--bg2:#0d1225;--bg3:#131828;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.04);
  --text:rgba(255,255,255,.9);--text2:rgba(255,255,255,.5);--text3:rgba(255,255,255,.22);
  --accent:#fc3cbf;--accent2:#0bf5f8;
  --r:16px;--r2:12px;--r3:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text)}
#root{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none;-ms-overflow-style:none}
input,textarea{font-family:inherit;font-size:16px;-webkit-appearance:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block}
.sora{font-family:'Sora',sans-serif}
.mono{font-family:'Space Mono',monospace}
.dm{font-family:'DM Sans',sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 8px var(--accent))}50%{filter:drop-shadow(0 0 18px var(--accent))}}
.anim-up{animation:fadeUp .28s ease both}
.pulse{animation:pulse 2s ease-in-out infinite}
.spin{animation:spin 1s linear infinite}
/* Shared screen scroll container */
.screen{flex:1;overflow-y:auto;overflow-x:hidden}
/* Header image */
.screen-header{position:relative;width:100%;overflow:hidden}
.screen-header img.bg{width:100%;display:block;object-fit:cover;mix-blend-mode:screen}
.screen-header .fade{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,12,24,0) 0%,rgba(8,12,24,.6) 60%,rgba(8,12,24,1) 100%)}
.screen-header .fade-top{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,12,24,.65) 0%,transparent 40%)}
.screen-header .content{position:absolute;bottom:0;left:0;right:0;padding:16px 20px 20px}
/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)}
/* Icon img — uses mix-blend-mode screen to drop black backgrounds */
.icon-img{mix-blend-mode:screen;display:block;flex-shrink:0}
/* Set card stage lockup */
.lockup-img{mix-blend-mode:screen;height:16px;object-fit:contain;display:block}
/* Input */
.input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;color:var(--text);font-size:15px;outline:none}
.input:focus{border-color:rgba(255,255,255,.2)}
/* Pill button */
.pill{padding:7px 18px;border-radius:20px;font-weight:600;font-size:12px;transition:all .15s;border:none}
.pill-active{background:var(--accent);color:#fff;box-shadow:0 0 18px rgba(252,60,191,.4)}
.pill-inactive{background:rgba(255,255,255,.07);color:var(--text2)}
/* Section label */
.section-label{font-size:10px;color:var(--text3);letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px}
</style>
</head>

const slug=s=>s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-$/,'');

/* ─── B2B ARTIST NAME FORMATTER ──────────────────────────────── */
const WORD_SPLITS={'INTERPLANETARY':'INTER-\nPLANETARY','AUDIOFREQ':'AUDIO-\nFREQ','TONESHIFTERZ':'TONE-\nSHIFTERZ','SAMPLIFIRE':'SAMPLE-\nFIRE','KLANGKUENSTLER':'KLANG-\nKUENSTLER'};

function ArtistName({name,size=15,weight=700,color='#fff',noWrap=false}){
  // Split on B2B — B2B goes at END of its line
  const parts=name.split(/\s+B2B\s+/i);
  if(parts.length===1){
    // Check for long word splits
    let display=name;
    for(const[k,v] of Object.entries(WORD_SPLITS)){
      if(name.toUpperCase().includes(k)){display=name.toUpperCase().replace(k,v);break;}
    }
    const lines=display.split('\n');
    return(
      <div className="sora" style={{fontWeight:weight,fontSize:size,color,lineHeight:1.15}}>
        {lines.map((l,i)=><div key={i}>{l}</div>)}
      </div>
    );
  }
  return(
    <div className="sora" style={{fontWeight:weight,fontSize:size,color,lineHeight:1.2}}>
      {parts.map((p,i)=>(
        <div key={i} style={{display:'block'}}>
          {p}
          {i<parts.length-1&&<span style={{fontSize:size*.72,color:'rgba(255,255,255,.4)',letterSpacing:'.06em'}}> B2B</span>}
        </div>
      ))}
    </div>
  );
}

function getPhase(now=Date.now()){
  const t=new Date(now);
  if(t<DAY_STARTS[0])return{phase:'pre'};
  if(t>FEST_END)return{phase:'post'};
  for(let i=2;i>=0;i--){
    const end=new Date(DAY_STARTS[i].getTime()+12.5*3600000);
    if(t>=DAY_STARTS[i]&&t<=end)return{phase:'live',day:i+1,dayStart:DAY_STARTS[i]};
  }
  for(let i=0;i<2;i++){
    const pe=new Date(DAY_STARTS[i].getTime()+12.5*3600000);
    if(t>pe&&t<DAY_STARTS[i+1])return{phase:'inter',nextDay:i+2,nextStart:DAY_STARTS[i+1]};
  }
  return{phase:'live',day:1,dayStart:DAY_STARTS[0]};
}

/* ─── CONFLICT RECON ─────────────────────────────────────────── */
function reconflict(selectedIds){
  const result={};
  for(const day of[1,2,3]){
    const sel=SCHEDULE.filter(s=>selectedIds.includes(s.id)&&s.day===day)
      .sort((a,b)=>toM(a.cs)-toM(b.cs))
      .map(s=>({...s}));
    for(let i=0;i<sel.length-1;i++){
      const a=sel[i],b=sel[i+1];
      const ov=toM(a.ce)-toM(b.cs);
      if(ov>0){
        if(ov<=15){sel[i]={...a,ce:b.cs,trimmed:true,trimMin:ov};}
        else{sel[i]={...a,conflict:true};sel[i+1]={...b,conflict:true};}
      }
    }
    sel.forEach(s=>{result[s.id]=s;});
  }
  return result;
}

/* ─── STORAGE & SHARE ────────────────────────────────────────── */
const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};
const encShare=ids=>ids.length?'#s='+ids.join('.'):'';;
const decShare=h=>{if(!h?.startsWith('#s='))return null;const ids=h.slice(3).split('.').filter(Boolean);const v=ids.filter(id=>SCHEDULE.some(s=>s.id===id));return v.length?v:null;};
const hap=(ms=8)=>{try{navigator.vibrate&&navigator.vibrate(ms);}catch{}};

/* ─── APP STATE ──────────────────────────────────────────────── */
function useApp(){
  const sharedOnLoad=useMemo(()=>decShare(window.location.hash),[]);
  const[sel,setSel]=useState(()=>LS.get('sel',[]));
  const[crew,setCrew]=useState(()=>LS.get('crew',[]));
  const[markers,setMarkers]=useState(()=>LS.get('markers',[]));
  const[pins,setPins]=useState(()=>LS.get('pins',[]));
  const[shared,setShared]=useState(sharedOnLoad);
  useEffect(()=>{LS.set('sel',sel);},[sel]);
  useEffect(()=>{LS.set('crew',crew);},[crew]);
  useEffect(()=>{LS.set('markers',markers);},[markers]);
  useEffect(()=>{LS.set('pins',pins);},[pins]);
  useEffect(()=>{if(!sharedOnLoad)history.replaceState(null,'',encShare(sel)||location.pathname);},[sel,sharedOnLoad]);
  const recon=useMemo(()=>reconflict(sel),[sel]);
  const toggle=useCallback(id=>{hap();setSel(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);},[]);
  return{sel,toggle,recon,crew,setCrew,markers,setMarkers,pins,setPins,shared,setShared};
}

function useClock(){
  const[now,setNow]=useState(Date.now());
  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),1000);return()=>clearInterval(t);},[]);
  return now;
}

/* ─── GRID ───────────────────────────────────────────────────── */
function GridScreen({day,setDay,nowDay,sel,toggle,recon,shared,onBack,onExport}){

  const phase=getPhase(now);
  const PPM=1.5,LCOL=38,CCOL=86,FSTART=17*60;
  const hours=Array.from({length:13},((_,i)=>17+i));
  const daySets=useMemo(()=>SCHEDULE.filter(s=>s.day===day&&STAGES.includes(s.stage)),[day]);
  let nowLine=null;
  if(phase.phase==='live'&&phase.day===day){
    const elapsed=(now-phase.dayStart.getTime())/60000;

    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

          </div>

              <img src={IC('status-action/action-download.webp')} alt="" className="icon-img" style={{width:12,height:12}}/>

            </button>
          </div>
        </div>
      </ScreenHeader>
      {/* Day + Stage headers */}
      <div style={{background:'rgba(8,12,24,.97)',backdropFilter:'blur(20px)',flexShrink:0,borderBottom:'1px solid rgba(255,255,255,.06)'}}>
        <div style={{display:'flex',gap:5,padding:'8px 14px'}}>
          {[['Fri',1],['Sat',2],['Sun',3]].map(([l,d])=>(
            <button key={d} onClick={()=>setDay(d)} className={day===d?'pill pill-active':'pill pill-inactive'} style={{position:'relative'}}>
              {l}{nowDay===d&&<span style={{position:'absolute',top:-2,right:-2,width:7,height:7,borderRadius:'50%',background:'#ff2d78',boxShadow:'0 0 6px #ff2d78'}}/>}
            </button>
          ))}
        </div>
        <div style={{display:'flex',paddingLeft:LCOL,overflowX:'auto'}}>

            const sc=SC[sg];
            return(
              <div key={sg} style={{width:CCOL,flexShrink:0,textAlign:'center',padding:'6px 2px 8px',borderBottom:`2px solid ${sc.p}`}}>

              </div>
            );
          })}
        </div>
      </div>
      {/* Grid body */}
      <div style={{flex:1,overflowX:'auto',overflowY:'auto'}}>
        <div style={{minWidth:LCOL+STAGES.length*CCOL,position:'relative',height:totalH+40}}>
          {hours.map(h=>(
            <div key={h} style={{position:'absolute',top:(h*60-FSTART)*PPM,left:0,right:0,display:'flex',alignItems:'center',zIndex:5,pointerEvents:'none'}}>
              <div className="mono" style={{width:LCOL,fontSize:7,color:'rgba(255,255,255,.16)',textAlign:'right',paddingRight:5,flexShrink:0}}>
                {h===24?'12A':h<24?h+':00':(h-24)+':00'}

            const si=STAGES.indexOf(s.stage);if(si<0)return null;
            const sc=SC[s.stage];
            const isSel=sel.includes(s.id);
            const isShared=shared&&shared.includes(s.id);
            const rec=recon[s.id]||s;
            const top=(toM(s.s)-FSTART)*PPM;

              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ─── EXPORT ─────────────────────────────────────────────────── */
function ExportScreen({sel,recon,shared,onBack}){
  const[stage,setStage]=useState('kineticFIELD');
  const[ratio,setRatio]=useState('9:16');
  const[day,setDay]=useState(1);
  const[busy,setBusy]=useState(false);
  const canvasRef=useRef();
  const sc=SC[stage];

  const selSets=useMemo(()=>SCHEDULE.filter(s=>sel.includes(s.id)&&s.day===day&&STAGES.includes(s.stage)).sort((a,b)=>toM(a.s)-toM(b.s)).filter(s=>{const r=recon[s.id]||s;return toM(r.ce)>toM(r.cs);}),[sel,day,recon]);

  const RATIOS={'9:16':[1080,1920],'4:5':[1080,1350],'1:1':[1080,1080],'19.5:9':[1920,882]};

  async function doExport(){
    setBusy(true);
    try{
      await document.fonts.ready;
      const[W,H]=RATIOS[ratio]||[1080,1920];
      const cv=canvasRef.current; cv.width=W; cv.height=H;
      const ctx=cv.getContext('2d');
      const bg=new Image(); bg.crossOrigin='anonymous';
      await new Promise(r=>{bg.onload=r;bg.onerror=r;bg.src=W(`${sc.key}-backdrop.webp`);});
      ctx.fillStyle='#080c18'; ctx.fillRect(0,0,W,H);
      if(bg.naturalWidth){
        const bsc=Math.max(W/bg.naturalWidth,H/bg.naturalHeight);
        ctx.globalAlpha=.5; ctx.globalCompositeOperation='screen';
        ctx.drawImage(bg,(W-bg.naturalWidth*bsc)/2,(H-bg.naturalHeight*bsc)/2,bg.naturalWidth*bsc,bg.naturalHeight*bsc);
        ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
      }
      const g=ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0,'rgba(8,12,24,.78)'); g.addColorStop(.4,'rgba(8,12,24,.2)'); g.addColorStop(.7,'rgba(8,12,24,.5)'); g.addColorStop(1,'rgba(8,12,24,.92)');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      const rg=ctx.createRadialGradient(W/2,H*.08,0,W/2,H*.08,W*.7);
      rg.addColorStop(0,sc.p+'28'); rg.addColorStop(1,'transparent');
      ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
      const pad=W*.06; let y=H*.08;
      ctx.font=`800 ${W*.18}px Sora,sans-serif`; ctx.textAlign='center'; ctx.fillStyle='#fff';
      ctx.shadowColor=sc.p; ctx.shadowBlur=W*.06;
      ctx.fillText('edc',W/2,y+W*.13); ctx.shadowBlur=0; y+=W*.16;
      ctx.font=`400 ${W*.028}px DM Sans,sans-serif`; ctx.fillStyle='rgba(255,255,255,.38)';
      ctx.fillText(`LAS VEGAS 2026 · ${'FRIDAY SATURDAY SUNDAY'.split(' ')[day-1]}`,W/2,y); y+=W*.018;
      ctx.beginPath(); const lg=ctx.createLinearGradient(pad,0,W-pad,0);
      lg.addColorStop(0,'transparent'); lg.addColorStop(.5,sc.p+'aa'); lg.addColorStop(1,'transparent');
      ctx.strokeStyle=lg; ctx.lineWidth=1.5; ctx.moveTo(pad,y+H*.012); ctx.lineTo(W-pad,y+H*.012); ctx.stroke();
      y+=H*.038;
      const CH=H*.072,CG=H*.011;
      for(const s of selSets){
        if(y+CH>H*.93)break;
        const stSc=SC[s.stage]; const rec=recon[s.id]||s;
        const cx=pad,cy=y,cw=W-pad*2,ch=CH;
        ctx.fillStyle=`${stSc.p}1e`; rRect(ctx,cx,cy,cw,ch,W*.018); ctx.fill();
        ctx.fillStyle=stSc.p; ctx.shadowColor=stSc.p; ctx.shadowBlur=W*.02;
        rRect(ctx,cx,cy,W*.011,ch,W*.004); ctx.fill(); ctx.shadowBlur=0;
        const parts=s.artist.split(' B2B ');
        ctx.font=`700 ${W*.034}px Sora,sans-serif`; ctx.fillStyle='#fff'; ctx.textAlign='left';
        let ty=cy+ch*.4;
        if(parts.length>1){
          ctx.font=`700 ${W*.028}px Sora,sans-serif`;
          parts.forEach((p,i)=>{
            if(i<parts.length-1){ctx.fillStyle='#fff';ctx.fillText(p,cx+W*.022,ty);ctx.fillStyle='rgba(255,255,255,.35)';ctx.font=`400 ${W*.022}px Sora,sans-serif`;ctx.fillText(' B2B',cx+W*.022+ctx.measureText(p).width,ty);ctx.font=`700 ${W*.028}px Sora,sans-serif`;}
            else{ctx.fillStyle='#fff';ctx.fillText(p,cx+W*.022,ty);}
            ty+=W*.036;
          });
          ty-=W*.016;
        } else {
          let txt=s.artist;
          while(ctx.measureText(txt).width>cw*.7&&txt.length>4)txt=txt.slice(0,-1);
          if(txt!==s.artist)txt+='…';
          ctx.fillText(txt,cx+W*.022,cy+ch*.45);
          ty=cy+ch*.45;
        }
        ctx.font=`400 ${W*.022}px Space Mono,monospace`; ctx.fillStyle='rgba(255,255,255,.25)'; ctx.textAlign='right';
        ctx.fillText(`${fmtT(s.s)}–${fmtT(s.e)}`,cx+cw-W*.018,cy+ch*.4);
        ctx.font=`700 ${W*.024}px Space Mono,monospace`; ctx.fillStyle=stSc.s;
        ctx.fillText(`CATCH ${fmtT(rec.cs)}–${fmtT(rec.ce)}`,cx+cw-W*.018,cy+ch*.75);
        y+=CH+CG;
      }
      if(!selSets.length){
        ctx.font=`400 ${W*.038}px DM Sans,sans-serif`; ctx.fillStyle='rgba(255,255,255,.22)'; ctx.textAlign='center';
        ctx.fillText('no sets selected for this day',W/2,H/2);
      }
      ctx.font=`400 ${W*.02}px Space Mono,monospace`; ctx.fillStyle='rgba(255,255,255,.18)'; ctx.textAlign='center';
      ctx.fillText('MY EDC LV 2026 · proof it happened.',W/2,H*.967);
      cv.toBlob(blob=>{
        const url=URL.createObjectURL(blob);
        const fn=`edc-2026-${'fri sat sun'.split(' ')[day-1]}.png`;
        if(navigator.share&&navigator.canShare?.({files:[new File([blob],fn,{type:'image/png'})]})){
          navigator.share({files:[new File([blob],fn,{type:'image/png'})],title:'My EDC 2026 Schedule'}).catch(()=>{});
        } else {
          const a=document.createElement('a'); a.href=url; a.download=fn; a.click();
        }
        setTimeout(()=>URL.revokeObjectURL(url),10000);
        setBusy(false);
      },'image/png');
    }catch(e){console.error(e);setBusy(false);}
  }

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <ScreenHeader img="header-export.webp" height={140}>
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
          <div>
            <div className="sora" style={{fontWeight:800,fontSize:20}}>EXPORT</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.3)',fontStyle:'italic'}}>proof it happened.</div>
          </div>
          <button onClick={onBack} style={{padding:'6px 12px',borderRadius:8,background:'rgba(255,255,255,.07)',color:'rgba(255,255,255,.4)',fontSize:11}}>← Back</button>
        </div>
      </ScreenHeader>
      <canvas ref={canvasRef} style={{display:'none'}}/>
      <div className="screen" style={{padding:'16px 20px 104px'}}>
        {/* Day */}
        <div style={{marginBottom:16}}>
          <div className="section-label">Day</div>
          <div style={{display:'flex',gap:6}}>
            {[['Friday',1],['Saturday',2],['Sunday',3]].map(([l,d])=>(
              <button key={d} onClick={()=>setDay(d)} className={day===d?'pill pill-active':'pill pill-inactive'}>{l}</button>
            ))}
          </div>
        </div>
        {/* Preview */}
        <div style={{position:'relative',borderRadius:18,overflow:'hidden',marginBottom:16,border:`1px solid ${sc.p}33`,boxShadow:`0 0 40px ${sc.p}18`,aspectRatio:ratio==='9:16'?'9/16':ratio==='4:5'?'4/5':ratio==='1:1'?'1/1':'19.5/9'}}>

function rRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

const PIN_TYPES=[
  {id:'meetup',label:'Meet Up',icon:'utility-meet-up-point.webp'},
  {id:'totem', label:'Totem',  icon:'utility-totem.webp'},
  {id:'water',  label:'Water',  icon:'utility-water.webp'},
  {id:'aid',    label:'First Aid',icon:'utility-first-aid.webp'},
  {id:'stage',  label:'Stage',  icon:'utility-stage.webp'},
  {id:'charge', label:'Charging',icon:'utility-charging.webp'},
];

function MapScreen({pins,setPins,crew}){
  const[zoom,setZoom]=useState(1);
  const[pan,setPan]=useState({x:0,y:0});
  const[sel,setSel]=useState(null);
  const[addMode,setAddMode]=useState(false);
  const[form,setForm]=useState({label:'',time:'',type:'meetup',crewId:'',color:'#14c4ed'});
  const tr=useRef({});

  function onTS(e){
    if(e.touches.length===2){tr.current={pinch:true,d0:Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY),z0:zoom};}
    else if(e.touches.length===1){tr.current={drag:true,x0:e.touches[0].clientX-pan.x,y0:e.touches[0].clientY-pan.y};}
  }
  function onTM(e){
    if(tr.current.pinch&&e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);setZoom(z=>Math.min(4,Math.max(.5,tr.current.z0*d/tr.current.d0)));}
    else if(tr.current.drag&&e.touches.length===1&&zoom>1){setPan({x:e.touches[0].clientX-tr.current.x0,y:e.touches[0].clientY-tr.current.y0});}
  }
  function onTE(){tr.current={};}

  function handleTap(e){
    if(!addMode)return;
    const r=e.currentTarget.getBoundingClientRect();
    const x=parseFloat(((e.clientX-r.left)/r.width*100).toFixed(1));
    const y=parseFloat(((e.clientY-r.top)/r.height*100).toFixed(1));
    setPins(p=>[...p,{id:Date.now(),x,y,...form}]);
    setAddMode(false);
    setForm({label:'',time:'',type:'meetup',crewId:'',color:'#14c4ed'});
  }

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <ScreenHeader img="header-map.webp" height={140}>
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
          <div>
            <div className="sora" style={{fontWeight:800,fontSize:20}}>MAP</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.3)',fontStyle:'italic'}}>find your way. eventually.</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {zoom>1&&<button onClick={()=>{setZoom(1);setPan({x:0,y:0});}} style={{padding:'6px 10px',borderRadius:8,background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.4)',fontSize:11}}>Reset</button>}
            <button onClick={()=>setAddMode(!addMode)} style={{
              display:'flex',alignItems:'center',gap:5,padding:'6px 12px',borderRadius:10,fontSize:11,fontWeight:600,
              border:`1px solid ${addMode?'#fc3cbf':'rgba(255,255,255,.12)'}`,
              background:addMode?'rgba(252,60,191,.15)':'rgba(255,255,255,.05)',
              color:addMode?'#fc3cbf':'rgba(255,255,255,.5)',
            }}>
              <img src={IC(addMode?'status-action/action-delete.webp':'status-action/action-add.webp')} alt="" className="icon-img" style={{width:14,height:14}}/>
              {addMode?'Cancel':'Pin'}
            </button>
          </div>
        </div>
      </ScreenHeader>

      {/* Add pin form */}
      {addMode&&(
        <div style={{flexShrink:0,background:'rgba(13,18,37,.97)',padding:'12px 16px',borderBottom:'1px solid rgba(255,255,255,.06)'}}>
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <input value={form.label} onChange={e=>setForm(f=>({...f,label:e.target.value}))} placeholder="Label (e.g. MEET HERE)" className="input" style={{flex:2}}/>
            <input value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} placeholder="Time" className="input" style={{flex:1}}/>
          </div>
          <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4}}>
            {PIN_TYPES.map(pt=>(
              <button key={pt.id} onClick={()=>setForm(f=>({...f,type:pt.id}))} style={{
                flexShrink:0,display:'flex',alignItems:'center',gap:5,padding:'5px 9px',borderRadius:8,fontSize:10,
                background:form.type===pt.id?'rgba(20,196,237,.15)':'rgba(255,255,255,.04)',
                border:`1px solid ${form.type===pt.id?'rgba(20,196,237,.4)':'rgba(255,255,255,.08)'}`,
                color:form.type===pt.id?'#14c4ed':'rgba(255,255,255,.4)',fontWeight:form.type===pt.id?600:400,
              }}>
                <img src={IC(`festival-utility/${pt.icon}`)} alt="" className="icon-img" style={{width:14,height:14}}/>
                {pt.label}
              </button>
            ))}
          </div>
          <div style={{fontSize:10,color:'#fc3cbf',marginTop:8}}>tap anywhere on the map to place pin</div>
        </div>
      )}

      {/* Map */}
      <div style={{flex:1,position:'relative',overflow:'hidden',background:'#040410',cursor:addMode?'crosshair':'grab'}}
        onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE} onClick={handleTap}>
        <div style={{width:'100%',height:'100%',transform:`scale(${zoom}) translate(${pan.x/zoom}px,${pan.y/zoom}px)`,transformOrigin:'center',transition:'transform .05s',position:'relative'}}>
          <img src="assets/map.webp" alt="EDC Map" onError={e=>{e.target.style.display='none';}} style={{width:'100%',height:'100%',objectFit:'contain'}}/>
          {/* Map placeholder art */}
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',opacity:.1,pointerEvents:'none',flexDirection:'column',gap:12}}>
            <img src={IC('festival-utility/utility-stage.webp')} alt="" className="icon-img" style={{width:64,height:64}}/>
            <div className="sora" style={{fontSize:13,letterSpacing:'.12em',color:'rgba(255,255,255,.6)'}}>MAP COMING SOON</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.4)',textAlign:'center'}}>add assets/map.webp to your repo</div>
          </div>
          {/* Custom pins */}
          {pins.map(p=>{
            const pt=PIN_TYPES.find(x=>x.id===p.type)||PIN_TYPES[0];
            return(
              <div key={p.id} onClick={e=>{e.stopPropagation();setSel({type:'pin',pin:p});}} style={{
                position:'absolute',left:`${p.x}%`,top:`${p.y}%`,transform:'translate(-50%,-100%)',cursor:'pointer',zIndex:15,
              }}>
                <div style={{background:p.color||'#14c4ed',borderRadius:'50%',width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 0 12px ${p.color||'#14c4ed'}`,margin:'0 auto 2px'}}>
                  <img src={IC(`festival-utility/${pt.icon}`)} alt="" className="icon-img" style={{width:16,height:16,filter:'invert(1)'}}/>
                </div>
                <div style={{fontSize:7,textAlign:'center',color:p.color||'#14c4ed',fontWeight:700,whiteSpace:'nowrap',textShadow:'0 1px 4px rgba(0,0,0,.9)'}}>{p.label}</div>
              </div>
            );
          })}
        </div>
        {/* Zoom */}
        <div style={{position:'absolute',right:12,top:12,display:'flex',flexDirection:'column',gap:6,zIndex:20}}>
          {['+','−'].map(b=>(
            <button key={b} onClick={()=>setZoom(z=>Math.min(4,Math.max(.5,z+(b==='+'?.35:-.35))))} style={{width:36,height:36,borderRadius:9,background:'rgba(8,12,24,.8)',backdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,.12)',color:'rgba(255,255,255,.6)',fontSize:20}}>{b}</button>
          ))}
        </div>
        {/* Tooltip */}
        {sel&&sel.type==='pin'&&(
          <div style={{position:'absolute',bottom:12,left:12,right:60,background:'rgba(4,8,20,.95)',backdropFilter:'blur(16px)',borderRadius:14,padding:'12px 14px',zIndex:30,border:`1px solid ${sel.pin.color||'#14c4ed'}33`}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
              {(()=>{const pt=PIN_TYPES.find(x=>x.id===sel.pin.type)||PIN_TYPES[0];return<img src={IC(`festival-utility/${pt.icon}`)} alt="" className="icon-img" style={{width:18,height:18,opacity:.7}}/>;})()}
              <div style={{fontWeight:700,fontSize:14,color:sel.pin.color||'#14c4ed'}}>{sel.pin.label}</div>
            </div>
            {sel.pin.time&&<div style={{fontSize:11,color:'rgba(255,255,255,.4)',marginBottom:2}}>⏱ {sel.pin.time}</div>}
            {sel.pin.crewId&&(()=>{const c=crew.find(x=>x.id===sel.pin.crewId);return c?<div style={{fontSize:11,color:'rgba(255,255,255,.4)'}}>🪄 {c.name}</div>:null;})()}
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button onClick={()=>{setPins(p=>p.filter(x=>x.id!==sel.pin.id));setSel(null);}} style={{fontSize:11,color:'#ff5555',background:'rgba(255,85,85,.1)',border:'1px solid rgba(255,85,85,.2)',borderRadius:6,padding:'5px 10px',display:'flex',alignItems:'center',gap:5}}>
                <img src={IC('status-action/action-delete.webp')} alt="" className="icon-img" style={{width:12,height:12}}/>Remove
              </button>
              <button onClick={()=>setSel(null)} style={{fontSize:11,color:'rgba(255,255,255,.4)',background:'rgba(255,255,255,.07)',borderRadius:6,padding:'5px 10px'}}>Close</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

        {crew.map(c=>(
          <div key={c.id} className="card" style={{padding:'14px',marginBottom:12,display:'flex',gap:12,alignItems:'center'}}>
            <div style={{width:60,height:60,borderRadius:12,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',flexShrink:0}}>
              {c.photo?<img src={c.photo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>:<img src={IC('festival-utility/utility-totem.webp')} alt="" className="icon-img" style={{width:28,height:28,opacity:.5}}/>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div className="sora" style={{fontWeight:700,fontSize:13,marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</div>
              {c.origin&&<div style={{fontSize:11,color:'rgba(255,255,255,.35)',marginBottom:2}}>{c.origin}{c.rep&&` · Rep: ${c.rep}`}</div>}
              {c.findUs&&<div style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'#fc3cbf',marginTop:4}}>
                <img src={IC('festival-utility/utility-meet-up-point.webp')} alt="" className="icon-img" style={{width:12,height:12,opacity:.7}}/>
                {c.findUs}
              </div>}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              <button onClick={()=>{setCf({name:c.name,origin:c.origin||'',rep:c.rep||'',findUs:c.findUs||'',photo:c.photo||''});setEditCrew(c.id);}} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'rgba(255,255,255,.4)',background:'rgba(255,255,255,.06)',borderRadius:6,padding:'5px 8px'}}>
                <img src={IC('status-action/action-edit.webp')} alt="" className="icon-img" style={{width:10,height:10}}/>Edit
              </button>
              <button onClick={()=>setCrew(p=>p.filter(x=>x.id!==c.id))} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#ff5555',background:'rgba(255,85,85,.08)',borderRadius:6,padding:'5px 8px'}}>
                <img src={IC('status-action/action-delete.webp')} alt="" className="icon-img" style={{width:10,height:10}}/>Del
              </button>
            </div>
          </div>
        ))}

        {/* Meetup markers */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',margin:'20px 0 10px'}}>
          <div className="section-label" style={{margin:0}}>Meetup Markers</div>
          <button onClick={()=>{setMf({label:'',time:'',day:0,color:'#FFD700'});setEditMarker('new');}} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'#fc3cbf',background:'rgba(252,60,191,.1)',border:'1px solid rgba(252,60,191,.25)',borderRadius:8,padding:'4px 10px',fontWeight:600}}>
            <img src={IC('status-action/action-add.webp')} alt="" className="icon-img" style={{width:12,height:12}}/>Add
          </button>
        </div>

        {editMarker&&(
          <div className="card" style={{padding:'14px',marginBottom:14}}>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <input value={mf.label} onChange={e=>setMf(f=>({...f,label:e.target.value}))} placeholder="Label *" className="input" style={{flex:2}}/>
              <input value={mf.time} onChange={e=>setMf(f=>({...f,time:e.target.value}))} placeholder="Time" className="input" style={{flex:1}}/>
            </div>
            <div style={{display:'flex',gap:8,marginBottom:8,alignItems:'center'}}>
              <input type="color" value={mf.color} onChange={e=>setMf(f=>({...f,color:e.target.value}))} style={{width:40,height:36,borderRadius:7,border:'1px solid rgba(255,255,255,.12)',background:'none',cursor:'pointer',padding:2}}/>
              <div style={{display:'flex',gap:4}}>
                {[0,1,2,3].map(d=>(
                  <button key={d} onClick={()=>setMf(f=>({...f,day:d}))} className={mf.day===d?'pill pill-active':'pill pill-inactive'} style={{padding:'5px 10px',fontSize:10}}>
                    {d===0?'All':['F','Sa','Su'][d-1]}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={saveMarker} style={{flex:1,padding:'10px',borderRadius:9,background:'#fc3cbf',color:'#fff',fontWeight:700,fontSize:12,fontFamily:'Sora,sans-serif'}}>Save</button>
              <button onClick={()=>setEditMarker(null)} style={{padding:'10px 16px',borderRadius:9,background:'rgba(255,255,255,.07)',color:'rgba(255,255,255,.4)',fontSize:12}}>Cancel</button>
            </div>
          </div>
        )}

        {markers.length===0&&!editMarker&&<div style={{textAlign:'center',padding:'14px',color:'rgba(255,255,255,.15)',fontSize:11,border:'1px dashed rgba(255,255,255,.06)',borderRadius:12,marginBottom:12}}>markers appear on schedule & exports</div>}
        {markers.map(m=>(
          <div key={m.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:m.color,boxShadow:`0 0 8px ${m.color}`,flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:13}}>{m.label}</div>
              {m.time&&<div style={{fontSize:10,color:'rgba(255,255,255,.28)',marginTop:1}}>{m.time}{m.day>0?` · ${'Fri Sat Sun'.split(' ')[m.day-1]}`:' · All days'}</div>}
            </div>
            <button onClick={()=>setMarkers(p=>p.filter(x=>x.id!==m.id))} style={{fontSize:16,color:'rgba(255,85,85,.6)',padding:6}}>×</button>
          </div>
        ))}

        {/* Kit checklist */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',margin:'24px 0 12px'}}>
          <div className="section-label" style={{margin:0}}>Kit Checklist</div>
          <span style={{fontSize:10,color:'rgba(255,255,255,.25)'}}>{kitChecked.length}/{KIT_ITEMS.length}</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {KIT_ITEMS.map(k=>{
            const checked=kitChecked.includes(k.id);
            return(
              <button key={k.id} onClick={()=>toggleKit(k.id)} style={{
                display:'flex',alignItems:'center',gap:10,padding:'11px 13px',borderRadius:12,
                background:checked?'rgba(252,60,191,.1)':'rgba(255,255,255,.03)',
                border:`1px solid ${checked?'rgba(252,60,191,.3)':'rgba(255,255,255,.07)'}`,
                textAlign:'left',transition:'all .15s',
              }}>
                <img src={IC(`kit-essentials/${k.icon}`)} alt="" className="icon-img" style={{width:22,height:22,opacity:checked?1:.45,mixBlendMode:'screen'}}/>
                <span style={{fontSize:12,fontWeight:checked?600:400,color:checked?'#fff':'rgba(255,255,255,.45)'}}>{k.label}</span>
                {checked&&<div style={{marginLeft:'auto',width:6,height:6,borderRadius:'50%',background:'#fc3cbf',boxShadow:'0 0 6px #fc3cbf',flexShrink:0}}/>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ─── INSTALL PROMPT ─────────────────────────────────────────── */
function InstallBanner(){
  const[show,setShow]=useState(false);
  const[prompt,setPrompt]=useState(null);
  useEffect(()=>{
    const v=parseInt(LS.get('visits',0))+1; LS.set('visits',v);
    window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();setPrompt(e);if(v>=2&&!LS.get('installDone'))setShow(true);});
  },[]);
  if(!show)return null;
  return(
    <div className="anim-up" style={{position:'fixed',bottom:90,left:14,right:14,background:'rgba(8,12,24,.97)',backdropFilter:'blur(24px)',borderRadius:20,padding:'16px',border:'1px solid rgba(252,60,191,.25)',boxShadow:'0 8px 40px rgba(0,0,0,.6)',zIndex:200}}>
      <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:12}}>
        <img src={W('icon-192.webp')} alt="" style={{width:48,height:48,borderRadius:12,flexShrink:0}}/>
        <div style={{flex:1}}>
          <div className="sora" style={{fontWeight:700,fontSize:14,marginBottom:2}}>Add to Home Screen</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.38)'}}>offline access during the festival</div>
        </div>
        <button onClick={()=>setShow(false)} style={{fontSize:20,opacity:.3,padding:4}}>×</button>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={async()=>{if(prompt){await prompt.prompt();prompt.userChoice.then(()=>{LS.set('installDone',1);setShow(false);});}else setShow(false);}} style={{flex:1,padding:'11px',borderRadius:10,background:'linear-gradient(135deg,#fc3cbf,#0bf5f8)',color:'#fff',fontWeight:700,fontSize:13,fontFamily:'Sora,sans-serif'}}>Install</button>
        <button onClick={()=>setShow(false)} style={{padding:'11px 16px',borderRadius:10,background:'rgba(255,255,255,.07)',color:'rgba(255,255,255,.4)',fontSize:13}}>Later</button>
      </div>
    </div>
  );
}

/* ─── SHARED BANNER ──────────────────────────────────────────── */
function SharedBanner({shared,onDismiss}){
  if(!shared)return null;
  return(
    <div style={{background:'rgba(255,62,178,.12)',borderBottom:'1px solid rgba(255,62,178,.25)',padding:'9px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <img src={IC('status-action/action-profile.webp')} alt="" className="icon-img" style={{width:16,height:16,opacity:.7}}/>
        <span style={{fontSize:11,color:'rgba(255,62,178,1)',fontWeight:600}}>viewing shared schedule · {shared.length} sets</span>
      </div>
      <button onClick={onDismiss} style={{fontSize:11,color:'rgba(255,255,255,.35)',background:'rgba(255,255,255,.07)',borderRadius:6,padding:'3px 8px'}}>Dismiss</button>
    </div>
  );
}

/* ─── DEV AUDIT ──────────────────────────────────────────────── */
function Audit({sel,recon,onClose}){
  const[r,setR]=useState(null);
  useEffect(()=>{
    const res={pwa:{manifest:!!document.querySelector('link[rel=manifest]'),sw:'serviceWorker' in navigator},schedule:{total:SCHEDULE.length,main:SCHEDULE.filter(s=>STAGES.includes(s.stage)).length,dups:[]},conflicts:{hard:[],trimmed:[]},storage:{selCount:sel.length}};
    const seen=new Set(); SCHEDULE.forEach(s=>{if(seen.has(s.id))res.schedule.dups.push(s.id);seen.add(s.id);});
    Object.values(recon).forEach(s=>{if(s.conflict)res.conflicts.hard.push(s.artist);if(s.trimmed)res.conflicts.trimmed.push(`${s.artist} (−${s.trimMin}m)`);});
    navigator.serviceWorker?.getRegistration().then(reg=>{res.pwa.swActive=!!reg?.active;setR({...res});});
    setR(res);
  },[]);
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(8,12,24,.97)',zIndex:999,overflowY:'auto',padding:'60px 20px 40px'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}>
        <div className="sora" style={{fontWeight:700,fontSize:16,color:'#fc3cbf'}}>DEV AUDIT</div>
        <button onClick={onClose} style={{fontSize:20,opacity:.4}}>×</button>
      </div>
      {r&&Object.entries(r).map(([k,v])=>(
        <div key={k} className="card" style={{marginBottom:12,padding:'12px 14px'}}>
          <div style={{fontWeight:700,fontSize:11,color:'#0bf5f8',marginBottom:8,letterSpacing:'.1em',textTransform:'uppercase'}}>{k}</div>
          <pre style={{fontSize:11,color:'rgba(255,255,255,.55)',lineHeight:1.8,whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{JSON.stringify(v,null,2)}</pre>
        </div>
      ))}
      <div style={{marginTop:20,fontSize:10,color:'rgba(255,255,255,.18)'}}>EDC LV 2026 PWA v2.0 · long-press version to open</div>
    </div>
  );
}

/* ─── ROOT ───────────────────────────────────────────────────── */
function App(){
  const[tab,setTab]=useState('home');
  const[audit,setAudit]=useState(false);
  const{sel,toggle,recon,crew,setCrew,markers,setMarkers,pins,setPins,shared,setShared}=useApp();

  useEffect(()=>{
    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  },[]);

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}>
      {shared&&<SharedBanner shared={shared} onDismiss={()=>setShared(null)}/>}
      <div key={tab} className="anim-up" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
        {tab==='home'&&<HomeScreen sel={sel} toggle={toggle} recon={recon} shared={shared}/>}
        {tab==='schedule'&&<ScheduleScreen sel={sel} toggle={toggle} recon={recon} shared={shared}/>}
        {tab==='map'&&<MapScreen pins={pins} setPins={setPins} crew={crew}/>}
        {tab==='crew'&&<CrewScreen crew={crew} setCrew={setCrew} markers={markers} setMarkers={setMarkers}/>}
        <BottomNav tab={tab} setTab={setTab}/>
      </div>
      <InstallBanner/>
      {audit&&<Audit sel={sel} recon={recon} onClose={()=>setAudit(false)}/>}
      <div
        onContextMenu={e=>{e.preventDefault();setAudit(true);}}
        onTouchStart={(()=>{let t;return()=>{t=setTimeout(()=>setAudit(true),800);};})()}
        onTouchEnd={()=>{}}
        style={{position:'absolute',bottom:4,right:8,fontSize:9,color:'rgba(255,255,255,.05)',zIndex:50,userSelect:'none',cursor:'default'}}
      >v2.0</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
